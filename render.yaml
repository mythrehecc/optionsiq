databases:
  - name: optionsiq-db
    databaseName: optionsiq
    user: optionsiq
    plan: free          # Render free Postgres – 1 GB persistent storage

services:
  - type: web
    name: optionsiq-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: optionsiq-db
          property: connectionString  # Render injects the full postgres:// URL
      - key: MAX_CONTENT_LENGTH
        value: "10485760"
      - key: UPLOAD_FOLDER
        value: uploads
